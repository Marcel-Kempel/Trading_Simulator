# ======== PROJECT IDENTIFICATION ========
sonar.projectKey=trading_simulator_v2
sonar.projectName=Trading Simulator V2
sonar.projectVersion=1.0.0

# ======== SONARCLOUD SETTINGS ========
sonar.host.url=https://sonarcloud.io
sonar.login=${SONAR_TOKEN}

# ======== SOURCE CODE ========
sonar.sources=backend/src/main
sonar.tests=backend/src/test
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes

# ======== LANGUAGE SPECIFIC ========
sonar.language=java
sonar.java.source=17
sonar.java.target=17
sonar.sourceEncoding=UTF-8

# ======== CODE COVERAGE (JACOCO) ========
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.java.coveragePlugin=jacoco
sonar.coverage.exclusions=\
  **/*Application.java,\
  **/config/**,\
  **/model/**

# ======== SECURITY & QUALITY ========
sonar.security.hotspots.enable=true
sonar.qualitygate.wait=true

# ======== EXCLUSIONS ========
sonar.exclusions=\
  **/test/**,\
  **/target/**,\
  **/*.min.js,\
  **/*.min.css
